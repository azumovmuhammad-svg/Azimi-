<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Боркунии аксҳо</title>
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #0b1625, #0e1c2e);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    
    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #6fa8ff;
      font-size: 20px;
    }
    
    .upload-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, #1f6feb, #1a4fa3);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .upload-btn:active {
      transform: scale(0.98);
    }
    
    input[type="file"] {
      display: none;
    }
    
    .preview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .preview-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 2/1;
      border: 2px solid rgba(111, 168, 255, 0.3);
    }
    
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .preview-item .num {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #1f6feb;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    
    .send-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    
    .send-btn.active {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    
    .status.success {
      color: #4caf50;
    }
    
    .status.error {
      color: #f44336;
    }
    
    .progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #1f6feb, #4caf50);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📸 Боркунии аксҳо</h2>
  
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    <span>📁</span>
    Интихоб аз галерея
  </button>
  
  <input type="file" id="fileInput" accept="image/*" multiple capture="environment">
  
  <div class="preview" id="preview"></div>
  
  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  
  <button class="send-btn" id="sendBtn" onclick="uploadFiles()">
    <span>⬆</span>
    Фиристодан ба сервер
  </button>
  
  <div class="status" id="status"></div>
</div>

<script>
  let selectedFiles = [];
  
  // Кушодани галерея вақти кушодани саҳифа
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('fileInput').click();
    }, 500);
  };
  
  document.getElementById('fileInput').addEventListener('change', function(e) {
    selectedFiles = Array.from(e.target.files).slice(0, 4);
    
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    
    selectedFiles.forEach((file, i) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <span class="num">${i + 1}</span>
          <img src="${e.target.result}" alt="Preview">
        `;
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
    
    if (selectedFiles.length > 0) {
      document.getElementById('sendBtn').classList.add('active');
      updateStatus(`${selectedFiles.length} акс интихоб шуд`);
    }
  });
  
  async function uploadFiles() {
    const btn = document.getElementById('sendBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    
    btn.style.display = 'none';
    progress.style.display = 'block';
    
    for (let i = 0; i < selectedFiles.length; i++) {
      const formData = new FormData();
      formData.append('file', selectedFiles[i]);
      formData.append('filename', `my-promo-${i + 1}.jpg`);
      
      try {
        const res = await fetch('/auth/upload-promo-image', {
          method: 'POST',
          body: formData
        });
        
        if (!res.ok) throw new Error('Upload failed');
        
        progressBar.style.width = `${((i + 1) / selectedFiles.length) * 100}%`;
        updateStatus(`Акси ${i + 1} фиристода шуд...`);
        
      } catch (e) {
        updateStatus(`❌ Хатогӣ дар акси ${i + 1}`, 'error');
        btn.style.display = 'flex';
        return;
      }
    }
    
    updateStatus('✅ Ҳама аксҳо фиристода шуданд!', 'success');
    
    setTimeout(() => {
      window.location.href = '/feed';
    }, 2000);
  }
  
  function updateStatus(text, type = '') {
    const status = document.getElementById('status');
    status.textContent = text;
    status.className = 'status ' + type;
  }
</script>

</body>
</html>
