<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Активные объявления - SadoApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/my_ads_active.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <span class="material-icons-outlined back-btn">arrow_back</span>
    <span class="header-title">Активные объявления</span>
    <span class="material-icons-outlined more-btn">more_vert</span>
  </div>

  <!-- FILTER - Ба таги header -->
  <div class="filter-section">
    <button class="filter-btn active" data-filter="all">
      <span class="material-icons-outlined">apps</span>
      Все
    </button>
    <button class="filter-btn" data-filter="recent">
      <span class="material-icons-outlined">schedule</span>
      Недавние
    </button>
    <button class="filter-btn" data-filter="popular">
      <span class="material-icons-outlined">trending_up</span>
      Популярные
    </button>
  </div>

  <!-- ADS LIST - Уфуқӣ -->
  <div class="ads-container" id="adsContainer">
    <!-- Ads will be loaded here -->
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-icon">
      <span class="material-icons-outlined">inventory_2</span>
    </div>
    <h3>Нет активных объявлений</h3>
    <p>Разместите своё первое объявление, чтобы начать продавать</p>
    <button class="create-ad-btn" onclick="window.location.href='/auth/add-selection'">
      <span class="material-icons-outlined">add_circle</span>
      Создать объявление
    </button>
  </div>

  <!-- FLOATING ACTION BUTTON -->
  <button class="fab" onclick="window.location.href='/auth/add-selection'">
    <span class="material-icons-outlined">add</span>
  </button>

<!-- Shorts - бе тағйир -->
<div class="shorts-divider"></div>

<section class="my-shorts-section">
  <div class="my-shorts-header">
    <h3 class="my-shorts-title">
      <span class="material-icons-outlined">play_circle</span>
      Мои Shorts
    </h3>
    <button onclick="createShort()" class="btn-create-short">
      <span class="material-icons-outlined">add</span>
      Создать
    </button>
  </div>
  
  <div id="myShortsContainer">
    <!-- Loading state -->
    <div class="loading-shorts">
      <div class="skeleton-short"></div>
      <div class="skeleton-short"></div>
    </div>
  </div>
</section>

</div>

<script src="/static/my_ads_active.js"></script>
</body>
</html>
