<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Privacy and Security</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    <span>Privacy and Security</span>
  </div>

  <!-- Security -->
  <div class="section">
    <div class="section-title">Security</div>

    <div class="item">
      <div class="text">
        <div class="title">Passcode Lock</div>
        <div class="subtitle">Off</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Two-Step Verification</div>
        <div class="subtitle">Off</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Active Sessions</div>
        <div class="subtitle">1 device</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <!-- Privacy -->
  <div class="section">
    <div class="section-title">Privacy</div>

    <div class="item">
      <div class="text">
        <div class="title">Phone Number</div>
        <div class="subtitle">Nobody</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Last Seen & Online</div>
        <div class="subtitle">My Contacts</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Profile Photos</div>
        <div class="subtitle">Everybody</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Calls</div>
        <div class="subtitle">My Contacts</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <!-- Advanced -->
  <div class="section">
    <div class="section-title">Advanced</div>

    <div class="item">
      <div class="text">
        <div class="title">Blocked Users</div>
        <div class="subtitle">0</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>

    <div class="item">
      <div class="text">
        <div class="title">Clear Cache</div>
      </div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

</div>

</body>
</html>
