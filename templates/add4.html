<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Предпросмотр - SadoApp</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/static/add4.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" onclick="goToStep(3)">
      <span class="material-icons-outlined">arrow_back</span>
    </button>
    <span class="header-title">Проверьте ваше объявление</span>
    <div style="width: 40px;"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="preview-card">
    
    <!-- IMAGE SLIDER -->
    <div class="image-slider" id="imageSlider">
      <div class="slides-container" id="slidesContainer">
        <!-- Images loaded from session -->
      </div>
      <div class="slider-counter" id="sliderCounter">1/1</div>
      <div class="slider-dots" id="sliderDots"></div>
      
      <!-- Edit photos button -->
      <button class="edit-photos-btn" onclick="goToStep(1)">
        <span class="material-icons-outlined">edit</span>
      </button>
    </div>

    <!-- CONTENT -->
    <div class="content-section">
      
      <!-- PRICE -->
      <div class="price-section">
        <span class="price-value" id="priceValue">--</span>
        <span class="price-currency" id="priceCurrency"></span>
        <span class="price-negotiable" id="priceNegotiable" style="display: none;">Договорная</span>
      </div>

      <!-- TITLE -->
      <h1 class="product-title" id="productTitle">--</h1>

      <!-- CATEGORY -->
      <div class="category-badge" id="categoryBadge">
        <span class="material-icons-outlined">category</span>
        <span id="categoryText">--</span>
      </div>

      <!-- LOCATION -->
      <div class="location-row">
        <span class="material-icons-outlined">location_on</span>
        <span id="locationText">--</span>
      </div>

      <!-- SELLER INFO -->
      <div class="seller-mini" id="sellerMini">
        <span class="material-icons-outlined">person</span>
        <span id="sellerName">--</span>
        <span class="verified-badge" title="Телефон подтвержден">✓</span>
      </div>

      <!-- DIVIDER -->
      <div class="divider"></div>

      <!-- DESCRIPTION -->
      <div class="description-section">
        <h3>Описание</h3>
        <p id="descriptionText">--</p>
      </div>

      <!-- ATTRIBUTES -->
      <div class="attributes-section" id="attributesSection">
        <h3>Характеристики</h3>
        <div class="attributes-grid" id="attributesGrid"></div>
      </div>

      <!-- CONTACT INFO -->
      <div class="contact-section" id="contactSection">
        <h3>Контакты</h3>
        <div class="contact-item">
          <span class="material-icons-outlined">phone</span>
          <span id="contactPhone">--</span>
        </div>
        <div class="contact-item" id="telegramItem" style="display: none;">
          <span class="material-icons-outlined">send</span>
          <span id="contactTelegram">--</span>
        </div>
      </div>

    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons">
      <button class="btn-edit" onclick="goToStep(2)">
        <span class="material-icons-outlined">edit</span>
        Изменить
      </button>
      <button class="btn-publish" onclick="publishPost()" id="publishBtn">
        <span class="material-icons-outlined">send</span>
        Опубликовать
      </button>
    </div>

  </div>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <span>Загрузка...</span>
  </div>

  <!-- SUCCESS OVERLAY -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">
        <span class="material-icons-outlined">check_circle</span>
      </div>
      <h2>Объявление опубликовано!</h2>
      <p>Ваше объявление теперь видно всем пользователям</p>
      <div class="success-actions">
        <button class="btn-view" onclick="viewPost()">
          <span class="material-icons-outlined">visibility</span>
          Смотреть
        </button>
        <button class="btn-share" onclick="sharePost()">
          <span class="material-icons-outlined">share</span>
          Поделиться
        </button>
        <button class="btn-home" onclick="goHome()">
          <span class="material-icons-outlined">home</span>
          На главную
        </button>
      </div>
    </div>
  </div>

</div>

<script src="/static/add4.js"></script>
</body>
</html>
