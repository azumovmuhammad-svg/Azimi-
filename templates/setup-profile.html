<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SadoApp - Создание профиля</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/static/setup-profile.css">
</head>
<body>

<div class="page">
  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <span class="material-icons-outlined">arrow_back</span>
    </button>
  </div>

  <div class="card">
    <div class="logo">
      <span class="material-icons-outlined">person</span>
    </div>

    <div class="title">Создание профиля</div>
    <div class="subtitle">Выберите имя и фото профиля</div>

    <form id="setup-form">
      
      <!-- Avatar Upload -->
      <div class="avatar-upload">
        <div class="avatar-preview" id="avatarPreview">
          <span class="material-icons-outlined">add_a_photo</span>
        </div>
        <input type="file" id="avatar" accept="image/*" hidden>
        <button type="button" class="avatar-btn" onclick="document.getElementById('avatar').click()">
          <span class="material-icons-outlined">camera_alt</span>
          Добавить фото
        </button>
      </div>

      <!-- Username Input -->
      <div class="input-group">
        <span class="input-icon material-icons-outlined">person_outline</span>
        <input
          type="text"
          id="username"
          class="input"
          placeholder="Ваше имя"
          maxlength="30"
          required
        >
      </div>

      <button type="submit" class="button" id="submitBtn">
        <span class="material-icons-outlined">check_circle</span>
        Продолжить
      </button>

    </form>
  </div>
</div>

<script src="/static/setup-profile.js"></script>
</body>
</html>
