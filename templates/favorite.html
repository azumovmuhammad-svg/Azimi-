<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Избранное - Azimi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/favorite.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <span class="material-icons-outlined back-btn" onclick="goBack()">arrow_back</span>
    <span class="header-title">Избранное</span>
    <span class="material-icons-outlined more-btn">more_vert</span>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-number" id="totalCount">0</span>
      <span class="stat-label">Всего</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="postsCount">0</span>
      <span class="stat-label">Объявления</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="shortsCount">0</span>
      <span class="stat-label">Shorts</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-section">
    <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">
      <span class="material-icons-outlined">apps</span>
      Все
    </button>
    <button class="tab-btn" data-tab="posts" onclick="switchTab('posts')">
      <span class="material-icons-outlined">article</span>
      Объявления
    </button>
    <button class="tab-btn" data-tab="shorts" onclick="switchTab('shorts')">
      <span class="material-icons-outlined">play_circle</span>
      Shorts
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content-container" id="contentContainer">
    <!-- Loading -->
    <div class="loading-state">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-icon">
      <span class="material-icons-outlined">favorite_border</span>
    </div>
    <h3>Нет избранного</h3>
    <p>Добавляйте понравившиеся объявления и shorts</p>
    <button class="browse-btn" onclick="goToFeed()">
      <span class="material-icons-outlined">explore</span>
      Смотреть объявления
    </button>
  </div>

</div>

<script src="/static/favorite.js"></script>
</body>
</html>
