<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Azimi Объявление</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #0a1628 0%, #1a237e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      max-width: 100%;
    }

    /* Logo */
    .logo-section {
      text-align: center;
      margin-top: 60px;
      margin-bottom: 48px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(30, 136, 229, 0.4);
    }

    .logo-icon span {
      font-size: 48px;
      color: #fff;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #64b5f6, #1e88e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      color: #90a4ae;
      font-size: 15px;
    }

    /* Card */
    .login-card {
      background: rgba(13, 27, 56, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px 24px;
      border: 1px solid rgba(100, 181, 246, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 15px;
      color: #90a4ae;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Phone Input */
    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64b5f6;
      font-size: 20px;
    }

    .input {
      width: 100%;
      padding: 18px 18px 18px 52px;
      background: rgba(30, 136, 229, 0.1);
      border: 2px solid rgba(100, 181, 246, 0.3);
      border-radius: 16px;
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      outline: none;
      transition: all 0.3s;
    }

    .input::placeholder {
      color: #546e7a;
    }

    .input:focus {
      border-color: #1e88e5;
      background: rgba(30, 136, 229, 0.15);
      box-shadow: 0 0 20px rgba(30, 136, 229, 0.2);
    }

    /* Button */
    .button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(30, 136, 229, 0.4);
    }

    .button:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(30, 136, 229, 0.3);
    }

    .button:disabled {
      background: #37474f;
      color: #78909c;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Face SMS Badge */
    .face-sms-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      border-radius: 12px;
      color: #2ecc71;
      font-size: 13px;
      font-weight: 500;
    }

    .face-sms-badge span {
      font-size: 16px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      color: #78909c;
      font-size: 14px;
    }

    .footer a {
      color: #64b5f6;
      text-decoration: none;
      font-weight: 600;
    }

    /* Terms */
    .terms {
      text-align: center;
      margin-top: 20px;
      color: #546e7a;
      font-size: 12px;
      line-height: 1.5;
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      animation: slideUp 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">
        <span class="material-icons-outlined">home</span>
      </div>
      <div class="logo-text">Azimi Объявление</div>
      <div class="logo-subtitle">Покупай и продавай легко</div>
    </div>

    <div class="login-card">
      <div class="title">Ваш номер телефона</div>
      <div class="subtitle">
        Пожалуйста, подтвердите код страны и введите номер телефона
      </div>

      <form id="login-form" onsubmit="return false;">
        <div class="input-wrapper">
          <span class="material-icons-outlined input-icon">phone</span>
          <input
            class="input"
            id="phone"
            type="tel"
            placeholder="+992 92 XXX XXXX"
            autocomplete="tel"
          >
        </div>
        
        <button class="button" type="button" id="send-code">
          <span class="material-icons-outlined">send</span>
          Отправить код
        </button>
      </form>

      <!-- Face SMS Badge -->
      <div class="face-sms-badge">
        <span class="material-icons-outlined">verified</span>
        Face SMS верификация
      </div>

      <div class="terms">
        Нажимая «Отправить код», вы соглашаетесь с 
        <a href="#" style="color: #64b5f6;">Условиями использования</a>
      </div>
    </div>
  </div>

  <div class="footer">
    Еще нет аккаунта? <a href="/register">Создать</a>
  </div>

  <script src="/static/script_login.js"></script>
</body>
</html>
