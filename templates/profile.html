<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="/static/profile.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.css">

</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="top-bar">
    <button class="back" onclick="history.back()">
      <span class="material-icons">arrow_back</span>
    </button>

    <div class="title">Profile</div>

    <button class="edit" id="editBtn">
      <span class="material-icons">edit</span>
    </button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="avatar-wrapper">
      <img id="avatar" src="/static/default-avatar.png">
      <div class="avatar-edit" id="avatarEdit">
        <span class="material-icons">photo_camera</span>
      </div>
    </div>

    <div class="name" id="username">Username</div>
    <div class="bio" id="bio">Bio</div>

    <div class="status">
      <span class="dot"></span>
      <span id="lastSeen">Last seen recently</span>
    </div>

    <button class="primary" id="editProfileBtn">Edit Profile</button>
  </div>

  <!-- ACCOUNT -->
  <div class="card">
    <div class="section-title">Account</div>

    <div class="row">
      <span class="label">
        <span class="material-icons">person</span>
        Name
      </span>
      <span class="value" id="usernameRow"></span>
    </div>

    <div class="row">
      <span class="label">
        <span class="material-icons">info</span>
        About
      </span>
      <span class="value" id="bioRow"></span>
    </div>
  </div>

  <!-- PRIVACY -->
  <div class="card">
    <div class="section-title">Privacy</div>

    <div class="row">
      <span class="label">
        <span class="material-icons">phone</span>
        Phone
      </span>
      <span class="value" id="phoneRow"></span>
    </div>

    <div class="row">
      <span class="label">
        <span class="material-icons">link</span>
        Links
      </span>
      <span class="value"></span>
    </div>
  </div>

  <div class="version">SadoApp</div>

</div>

    <!-- Avatar Crop Modal -->
<div id="avatarModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
     background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000;">
  <div style="position:relative; background:white; padding:20px; border-radius:8px; max-width:90%; max-height:90%; display:flex; flex-direction:column; align-items:center;">
    <img id="avatarPreview" src="" style="max-width:100%; max-height:70vh; border-radius:8px;">
    
    <!-- Action Buttons -->
    <div id="avatarActions" style="margin-top:10px; display:flex; gap:10px;">
      <button id="editBtn">Edit</button>
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn">Save</button>
    </div>
  </div>
</div>


<script src="https://unpkg.com/cropperjs/dist/cropper.js"></script>
<script src="/static/profile.js"></script>
</body>
</html>
