<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Azimi - Подтверждение</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="static/register.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <div class="header">
      <button class="back-btn" onclick="history.back()">
        <span class="material-icons-outlined">arrow_back</span>
      </button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="logo">
        <span class="material-icons-outlined">message</span>
      </div>
      
      <div class="title">Код подтверждения</div>
      <div class="subtitle">Код отправлен на номер</div>
      <div id="phone-display">+992 92 XXX XX XX</div>

      <form id="code-form">
        <div class="code-inputs">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric">
        </div>

        <div class="timer-section">
          <div class="timer-text">Отправить код повторно через</div>
          <div class="timer-countdown" id="countdown">00:59</div>
          <button type="button" class="resend-btn" id="resendBtn">
            <span class="material-icons-outlined">refresh</span>
            Отправить повторно
          </button>
        </div>

        <button type="submit" class="button" id="submitBtn" disabled>
          <span class="material-icons-outlined">check_circle</span>
          Подтвердить
        </button>
      </form>
    </div>

    <!-- Help Section -->
    <div class="help-section">
      <a href="#" class="help-link">Не приходит код?</a>
      <br>
      <button class="wrong-number" onclick="history.back()">
        Неверный номер телефона?
      </button>
    </div>
  </div>

  <script src="/static/script_register.js"></script>
</body>
</html>
