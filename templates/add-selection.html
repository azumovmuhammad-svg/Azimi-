<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/static/add-selection.css">
</head>
<body>
  <header class="add-header">
    <span class="material-icons-outlined back-icon">arrow_back</span>
    <h1>Добавить</h1>
  </header>

  <main class="add-main">
    <div class="icons-container">
      <div class="icon-card" id="postBtn">
        <span class="material-icons-outlined">image</span>
        <span>Post</span>
      </div>
      <div class="icon-card" id="shortBtn">
        <span class="material-icons-outlined">videocam</span>
        <span>Short</span>
      </div>
    </div>
  </main>

  <footer class="add-footer">
    <button id="continueBtn">Продолжить</button>
  </footer>

  <script src="/static/add-selection.js"></script>
</body>
</html>
