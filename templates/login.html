<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Azimi Объявление</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="static/login.css">
</head>
<body>
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <span class="material-icons-outlined">login</span>
      </div>
      <div class="logo-text">Azimi Объявление</div>
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <div class="subtitle">
        Пожалуйста,введите номер телефона и мы отправим на него верификатционный код
      </div>

      <form id="login-form" onsubmit="return false;">
        <div class="input-wrapper">
          <span class="material-icons-outlined input-icon">phone</span>
          <input
            class="input"
            id="phone"
            type="tel"
            placeholder="+992 ХХХ XXX XXXX"
            autocomplete="tel"
          >
        </div>
        
        <button class="button" type="button" id="send-code">
          <span class="material-icons-outlined">send</span>
          Отправить код
        </button>
      </form>

      <!-- Face SMS Badge -->
      <div class="face-sms-badge">
        <span class="material-icons-outlined">verified</span>
        SMS холо дар дастрас нест
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="terms">
        Нажимая «Отправить код», вы соглашаетесь с 
        <a href="#">Условиями использования</a>
      </div>
    </div>
  </div>

  <script src="/static/script_login.js"></script>
</body>
</html>
