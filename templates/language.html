<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language</title>
  <link rel="stylesheet" href="/static/language.css">
</head>

<body>
<div class="page">

  <div class="header">
    <a href="/auth/settings">←</a>
    <h1>Language</h1>
  </div>

  <div class="section">
    <div class="item" onclick="setLang('en')">
      <span>🇺🇸 English</span>
      <span class="check">✓</span>
    </div>

    <div class="item" onclick="setLang('es')">
      <span>🇪🇸 Spanish</span>
    </div>

    <div class="item" onclick="setLang('fr')">
      <span>🇫🇷 French</span>
    </div>

    <div class="item" onclick="setLang('de')">
      <span>🇩🇪 German</span>
    </div>

    <div class="item" onclick="setLang('ru')">
      <span>🇷🇺 Russian</span>
    </div>
  </div>

</div>

<script src="/static/language.js"></script>
</body>
</html>
